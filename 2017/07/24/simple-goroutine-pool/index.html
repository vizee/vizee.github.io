">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> gorpool</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;sync&quot;</span></span><br><span class="line">	<span class="string">&quot;time&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> gor <span class="keyword">struct</span> &#123;</span><br><span class="line">	ch  <span class="keyword">chan</span> <span class="function"><span class="keyword">func</span><span class="params">()</span></span></span><br><span class="line">	idx <span class="keyword">int</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> Pool <span class="keyword">struct</span> &#123;</span><br><span class="line">	mu      sync.Mutex</span><br><span class="line">	idle    []*gor</span><br><span class="line">	Reserve <span class="keyword">uint</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">reserve</span><span class="params">(kb <span class="keyword">uint</span>)</span></span> &#123;</span><br><span class="line">	<span class="keyword">var</span> stack [<span class="number">1024</span>]<span class="keyword">byte</span></span><br><span class="line">	_ = stack[<span class="number">1023</span>]</span><br><span class="line">	<span class="keyword">if</span> kb &lt;= <span class="number">1</span> &#123;</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	reserve(kb - <span class="number">1</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(p *Pool)</span> <span class="title">gorproc</span><span class="params">(g *gor)</span></span> &#123;</span><br><span class="line">	<span class="comment">// only a new gor reserves stack</span></span><br><span class="line">	<span class="keyword">if</span> r := p.Reserve; r &gt;= <span class="number">1024</span> &#123;</span><br><span class="line">		reserve(r / <span class="number">1024</span>)</span><br><span class="line">	&#125;</span><br><span class="line">	tm := time.NewTimer(time.Minute)</span><br><span class="line">	down := <span class="literal">false</span></span><br><span class="line">	<span class="keyword">for</span> !down &#123;</span><br><span class="line">		tm.Reset(time.Minute)</span><br><span class="line">		<span class="keyword">select</span> &#123;</span><br><span class="line">		<span class="keyword">case</span> fn := &lt;-g.ch:</span><br><span class="line">			fn()</span><br><span class="line">			p.mu.Lock()</span><br><span class="line">			g.idx = <span class="built_in">len</span>(p.idle)</span><br><span class="line">			p.idle = <span class="built_in">append</span>(p.idle, g)</span><br><span class="line">			p.mu.Unlock()</span><br><span class="line">		<span class="keyword">case</span> &lt;-tm.C:</span><br><span class="line">			p.mu.Lock()</span><br><span class="line">			<span class="keyword">if</span> g.idx &gt;= <span class="number">0</span> &#123;</span><br><span class="line">				t := p.idle[<span class="built_in">len</span>(p.idle)<span class="number">-1</span>]</span><br><span class="line">				t.idx = g.idx</span><br><span class="line">				p.idle[t.idx] = t</span><br><span class="line">				p.idle = p.idle[:<span class="built_in">len</span>(p.idle)<span class="number">-1</span>]</span><br><span class="line">				down = <span class="literal">true</span></span><br><span class="line">			&#125;</span><br><span class="line">			p.mu.Unlock()</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(p *Pool)</span> <span class="title">Go</span><span class="params">(fn <span class="keyword">func</span>()</span>)</span> &#123;</span><br><span class="line">	<span class="keyword">if</span> fn == <span class="literal">nil</span> &#123;</span><br><span class="line">		<span class="built_in">panic</span>(<span class="string">&quot;nil func&quot;</span>)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">var</span> g *gor</span><br><span class="line">	p.mu.Lock()</span><br><span class="line">	<span class="keyword">if</span> <span class="built_in">len</span>(p.idle) &gt; <span class="number">0</span> &#123;</span><br><span class="line">		g = p.idle[<span class="built_in">len</span>(p.idle)<span class="number">-1</span>]</span><br><span class="line">		p.idle = p.idle[:<span class="built_in">len</span>(p.idle)<span class="number">-1</span>]</span><br><span class="line">		g.idx = <span class="number">-1</span></span><br><span class="line">	&#125;</span><br><span class="line">	p.mu.Unlock()</span><br><span class="line">	<span class="keyword">if</span> g == <span class="literal">nil</span> &#123;</span><br><span class="line">		g = &amp;gor&#123;</span><br><span class="line">			ch:  <span class="built_in">make</span>(<span class="keyword">chan</span> <span class="function"><span class="keyword">func</span><span class="params">()</span>, 1),</span></span><br><span class="line">			idx: <span class="number">-1</span>,</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">go</span> p.gorproc(g)</span><br><span class="line">	&#125;</span><br><span class="line">	g.ch &lt;- fn</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
