ine">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash">! /bin/bash</span></span><br><span class="line"></span><br><span class="line">if [ -z $DBMD ]; then</span><br><span class="line">    DBMD=database.md</span><br><span class="line">fi</span><br><span class="line"></span><br><span class="line">state=0</span><br><span class="line"></span><br><span class="line">cat $DBMD | tr -d &quot;\r&quot; |  while read line</span><br><span class="line">do</span><br><span class="line">    field=$&#123;line%%\ *&#125;</span><br><span class="line">    if [ &quot;$field&quot; == &#x27;#&#x27; ]; then</span><br><span class="line">        if [ $state -eq 0 ]; then</span><br><span class="line">            dbname=$&#123;line#*\ &#125;</span><br><span class="line">            echo &quot;CREATE DATABASE IF NOT EXISTS \`$dbname\` DEFAULT CHARACTER SET utf8 COLLATE utf8_general_ci;&quot;</span><br><span class="line">	    echo</span><br><span class="line">	    echo &quot;USE \`$dbname\`;&quot;</span><br><span class="line">            state=1</span><br><span class="line">        else</span><br><span class="line">            exit 1</span><br><span class="line">        fi</span><br><span class="line">    elif [ &quot;$field&quot; == &#x27;##&#x27; ]; then</span><br><span class="line">        if [ &quot;$&#123;line#*\ &#125;&quot; == &#x27;tables&#x27; ]; then</span><br><span class="line">            if [ $state -eq 1 ]; then</span><br><span class="line">                state=2</span><br><span class="line">            else</span><br><span class="line">                exit 1</span><br><span class="line">            fi</span><br><span class="line">        elif [ &quot;$&#123;line#*\ &#125;&quot; == &#x27;sql&#x27; ]; then</span><br><span class="line">            if [[ $state == 2 ]] || [[ $state == 1 ]]; then</span><br><span class="line">                state=5</span><br><span class="line">            else</span><br><span class="line">                exit 1</span><br><span class="line">            fi</span><br><span class="line">        fi</span><br><span class="line">    elif [ &quot;$field&quot; == &#x27;###&#x27; ]; then</span><br><span class="line">        if [ $state -eq 2 ]; then</span><br><span class="line">            echo</span><br><span class="line">            echo &quot;CREATE TABLE IF NOT EXISTS \`$DBPREF$&#123;line#*\ &#125;\` (&quot;</span><br><span class="line">            state=3</span><br><span class="line">            unset primkey</span><br><span class="line">        else</span><br><span class="line">            exit 1</span><br><span class="line">        fi</span><br><span class="line">    elif [ &quot;$field&quot; == &#x27;```&#x27; ]; then</span><br><span class="line">        if [ $state -eq 3 ]; then</span><br><span class="line">            state=4</span><br><span class="line">        elif [ $state -eq 4 ]; then</span><br><span class="line">            if [ ! -z $primkey ]; then</span><br><span class="line">                echo &quot;  PRIMARY KEY (\`$primkey\`)&quot;;</span><br><span class="line">            fi</span><br><span class="line">            echo &quot;)$TBLATTR;&quot;</span><br><span class="line">            state=2</span><br><span class="line">        elif [ $state -eq 5 ]; then</span><br><span class="line">            echo</span><br><span class="line">            state=6</span><br><span class="line">        elif [ $state -eq 6 ]; then</span><br><span class="line">            state=1</span><br><span class="line">        else</span><br><span class="line">            exit 1</span><br><span class="line">        fi</span><br><span class="line">    elif [ $state -eq 4 ]; then</span><br><span class="line">        attr=&#x27;NOT NULL&#x27;</span><br><span class="line">        if [ -z $primkey ]; then</span><br><span class="line">            primkey=$field</span><br><span class="line">            attr=$attr&#x27; AUTO_INCREMENT&#x27;</span><br><span class="line">        fi</span><br><span class="line">        temp=$&#123;line#*\ &#125;</span><br><span class="line">        typename=$&#123;temp%\ //*&#125;</span><br><span class="line">        case $typename in</span><br><span class="line">            &#x27;int&#x27;) typename=&#x27;int(11)&#x27;;;</span><br><span class="line">            &#x27;tinyint&#x27;) typename=&#x27;tinyint(4)&#x27;;;</span><br><span class="line">        esac</span><br><span class="line">        comment=$&#123;line#*//\ &#125;</span><br><span class="line">        echo &quot;  \`$field\` $typename $attr COMMENT &#x27;$comment&#x27;,&quot;</span><br><span class="line">    elif [ $state -eq 6 ]; then</span><br><span class="line">        echo &quot;$line&quot;</span><br><span class="line">    fi</span><br><span class="line">done</span><br></pre></td></tr></table></figure>
